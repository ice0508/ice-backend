<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理 - 用户列表</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css" />
    <script src="https://unpkg.com/element-plus"></script>
    <style>
        #app { padding: 20px; }
        .pagination-container { margin-top: 20px; display: flex; justify-content: flex-end; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .user-info { display: flex; align-items: center; gap: 12px; }
    </style>
</head>
<body>
<div id="app">
    <!-- 顶部状态栏 -->
    <div class="header-bar">
        <h2 style="margin:0;">用户管理</h2>
        <div class="user-info" v-if="currentUser">
            <span>欢迎，<strong>{{ currentUser.username }}</strong> ({{ currentUser.role || '普通用户' }})</span>
            <el-button size="small" @click="handleLogout">退出登录</el-button>
        </div>
        <div class="user-info" v-else>
            <el-button size="small" type="primary" @click="showLoginDialog">登录</el-button>
            <el-button size="small" @click="showRegisterDialog">注册</el-button>
        </div>
    </div>

    <!-- 搜索栏 + 新增 -->
    <div style="margin: 15px 0; display: flex; gap: 10px;">
        <el-input v-model="searchKeyword" placeholder="搜索用户名/邮箱/手机号" clearable style="width: 300px;" @clear="handleSearch" @keyup.enter="handleSearch" />
        <el-button type="primary" @click="handleSearch">搜索</el-button>
        <el-button @click="handleReset">重置</el-button>
        <el-button type="success" @click="handleAdd" :disabled="!currentUser">新增用户</el-button>
    </div>

    <!-- 用户表格 -->
    <el-table v-loading="loading" :data="users" style="margin-top: 20px">
        <el-table-column prop="id" label="ID" width="80"></el-table-column>
        <el-table-column prop="username" label="用户名"></el-table-column>
        <el-table-column prop="email" label="邮箱"></el-table-column>
        <el-table-column prop="phone" label="手机号"></el-table-column>
        <el-table-column label="操作" width="150">
            <template #default="scope">
                <el-button size="small" @click="handleEdit(scope.row)" :disabled="!currentUser">编辑</el-button>
                <el-button size="small" type="danger" @click="handleDelete(scope.row.id)" :disabled="!currentUser">删除</el-button>
            </template>
        </el-table-column>
    </el-table>

    <!-- 分页 -->
    <div class="pagination-container">
        <el-pagination
                v-model:current-page="currentPage"
                v-model:page-size="pageSize"
                :page-sizes="[5, 10, 20, 50]"
                :total="total"
                layout="total, sizes, prev, pager, next, jumper"
                @size-change="handleSizeChange"
                @current-change="handlePageChange"
        />
    </div>

    <!-- 用户表单弹窗（新增/编辑） -->
    <el-dialog v-model="dialogVisible" :title="dialogTitle" width="500px" @closed="resetForm">
        <el-form :model="form" :rules="rules" ref="formRef" label-width="80px">
            <el-form-item label="用户名" prop="username">
                <el-input v-model="form.username" placeholder="请输入用户名" :disabled="!!form.id" />
            </el-form-item>
            <el-form-item label="密码" prop="password" v-if="!form.id">
                <el-input v-model="form.password" type="password" placeholder="请输入密码" show-password />
            </el-form-item>
            <el-form-item label="邮箱" prop="email">
                <el-input v-model="form.email" placeholder="请输入邮箱" />
            </el-form-item>
            <el-form-item label="手机号" prop="phone">
                <el-input v-model="form.phone" placeholder="请输入手机号" />
            </el-form-item>
        </el-form>
        <template #footer>
            <el-button @click="dialogVisible = false">取消</el-button>
            <el-button type="primary" @click="submitForm" :loading="submitLoading">确定</el-button>
        </template>
    </el-dialog>

    <!-- 登录弹窗 -->
    <el-dialog v-model="loginDialogVisible" title="登录" width="400px">
        <el-form :model="loginForm" :rules="loginRules" ref="loginFormRef" label-width="70px">
            <el-form-item label="账号" prop="account">
                <el-input v-model="loginForm.account" placeholder="用户名/邮箱" />
            </el-form-item>
            <el-form-item label="密码" prop="password">
                <el-input v-model="loginForm.password" type="password" placeholder="密码" show-password />
            </el-form-item>
        </el-form>
        <template #footer>
            <el-button @click="loginDialogVisible = false">取消</el-button>
            <el-button type="primary" @click="handleLogin" :loading="loginLoading">登录</el-button>
        </template>
    </el-dialog>

    <!-- 注册弹窗 -->
    <el-dialog v-model="registerDialogVisible" title="注册新用户" width="450px">
        <el-form :model="registerForm" :rules="registerRules" ref="registerFormRef" label-width="80px">
            <el-form-item label="用户名" prop="username">
                <el-input v-model="registerForm.username" placeholder="用户名" />
            </el-form-item>
            <el-form-item label="密码" prop="password">
                <el-input v-model="registerForm.password" type="password" placeholder="密码" show-password />
            </el-form-item>
            <el-form-item label="邮箱" prop="email">
                <el-input v-model="registerForm.email" placeholder="邮箱" />
            </el-form-item>
            <el-form-item label="手机号" prop="phone">
                <el-input v-model="registerForm.phone" placeholder="手机号" />
            </el-form-item>
        </el-form>
        <template #footer>
            <el-button @click="registerDialogVisible = false">取消</el-button>
            <el-button type="primary" @click="handleRegister" :loading="registerLoading">注册</el-button>
        </template>
    </el-dialog>
</div>

<script>
    const { createApp, ref, reactive, watch } = Vue;
    const { ElMessage, ElMessageBox } = ElementPlus;

    createApp({
        setup() {
            // ----- 状态 -----
            const users = ref([]);
            const currentPage = ref(1);
            const pageSize = ref(10);
            const total = ref(0);
            const searchKeyword = ref('');
            const loading = ref(false);

            // 当前登录用户 (从 localStorage 读取)
            const currentUser = ref(null);

            // 新增/编辑弹窗
            const dialogVisible = ref(false);
            const dialogTitle = ref('新增用户');
            const submitLoading = ref(false);
            const formRef = ref(null);
            const form = ref({ id: null, username: '', password: '', email: '', phone: '' });
            const rules = {
                username: [{ required: true, message: '请输入用户名', trigger: 'blur' }],
                password: [{ required: true, message: '请输入密码', trigger: 'blur' }],
                email: [
                    { required: true, message: '请输入邮箱', trigger: 'blur' },
                    { type: 'email', message: '邮箱格式不正确', trigger: 'blur' }
                ],
                phone: [
                    { required: true, message: '请输入手机号', trigger: 'blur' },
                    { pattern: /^1[3-9]\d{9}$/, message: '手机号格式不正确', trigger: 'blur' }
                ]
            };

            // 登录弹窗
            const loginDialogVisible = ref(false);
            const loginLoading = ref(false);
            const loginFormRef = ref(null);
            const loginForm = reactive({ account: '', password: '' });
            const loginRules = {
                account: [{ required: true, message: '请输入账号', trigger: 'blur' }],
                password: [{ required: true, message: '请输入密码', trigger: 'blur' }]
            };

            // 注册弹窗
            const registerDialogVisible = ref(false);
            const registerLoading = ref(false);
            const registerFormRef = ref(null);
            const registerForm = reactive({ username: '', password: '', email: '', phone: '' });
            const registerRules = {
                username: [{ required: true, message: '请输入用户名', trigger: 'blur' }],
                password: [{ required: true, message: '请输入密码', trigger: 'blur' }],
                email: [
                    { required: true, message: '请输入邮箱', trigger: 'blur' },
                    { type: 'email', message: '邮箱格式不正确', trigger: 'blur' }
                ],
                phone: [
                    { required: true, message: '请输入手机号', trigger: 'blur' },
                    { pattern: /^1[3-9]\d{9}$/, message: '手机号格式不正确', trigger: 'blur' }
                ]
            };

            // 初始化：从 localStorage 恢复用户登录状态
            const storedUser = localStorage.getItem('currentUser');
            const storedToken = localStorage.getItem('token');
            if (storedUser && storedToken) {
                try {
                    currentUser.value = JSON.parse(storedUser);
                } catch (e) {}
            } else {
                // token 不存在，清除过期的用户信息
                localStorage.removeItem('currentUser');
                currentUser.value = null;
            }

            // ----- 工具方法 -----
            const getHeaders = () => {
                const headers = { 'Content-Type': 'application/json' };
                const token = localStorage.getItem('token');
                if (token) {
                    headers['Authorization'] = 'Bearer ' + token;
                }
                return headers;
            };

            // ----- 用户列表操作 -----
            const fetchUsers = async () => {
                loading.value = true;
                try {
                    const keyword = searchKeyword.value.trim();
                    let url = `/users/page?page=${currentPage.value}&size=${pageSize.value}`;
                    if (keyword) {
                        url += `&keyword=${encodeURIComponent(keyword)}`;
                    }
                    const res = await fetch(url, { headers: getHeaders() });
                    const data = await res.json();
                    if (data.code === 200) {
                        users.value = data.data.records;
                        total.value = data.data.total;
                    } else {
                        ElMessage.error(data.message || '获取失败');
                    }
                } catch (e) {
                    ElMessage.error('请求错误');
                } finally {
                    loading.value = false;
                }
            };

            const handleSearch = () => {
                currentPage.value = 1;
                fetchUsers();
            };
            const handleReset = () => {
                searchKeyword.value = '';
                currentPage.value = 1;
                fetchUsers();
            };
            const handleSizeChange = (newSize) => {
                pageSize.value = newSize;
                currentPage.value = 1;
                fetchUsers();
            };
            const handlePageChange = (newPage) => {
                currentPage.value = newPage;
                fetchUsers();
            };

            const handleAdd = () => {
                dialogTitle.value = '新增用户';
                form.value = { id: null, username: '', password: '', email: '', phone: '' };
                dialogVisible.value = true;
            };
            const handleEdit = (row) => {
                dialogTitle.value = '编辑用户';
                form.value = { id: row.id, username: row.username, password: '', email: row.email, phone: row.phone };
                dialogVisible.value = true;
            };
            const resetForm = () => {
                formRef.value?.resetFields();
            };

            const submitForm = async () => {
                const valid = await formRef.value.validate().catch(() => false);
                if (!valid) return;
                submitLoading.value = true;
                try {
                    const method = form.value.id ? 'PUT' : 'POST';
                    const url = form.value.id ? `/users/${form.value.id}` : '/users';
                    const payload = { ...form.value };
                    if (form.value.id) delete payload.password; // 编辑时一般不修改密码
                    const res = await fetch(url, {
                        method,
                        headers: getHeaders(),
                        body: JSON.stringify(payload)
                    });
                    const data = await res.json();
                    if (data.code === 200) {
                        ElMessage.success(dialogTitle.value === '新增用户' ? '创建成功' : '更新成功');
                        dialogVisible.value = false;
                        fetchUsers();
                    } else {
                        ElMessage.error(data.message || '操作失败');
                    }
                } catch (e) {
                    ElMessage.error('请求错误');
                } finally {
                    submitLoading.value = false;
                }
            };

            const handleDelete = async (id) => {
                try {
                    await ElMessageBox.confirm('确定要删除该用户吗？', '删除确认', {
                        confirmButtonText: '确定',
                        cancelButtonText: '取消',
                        type: 'warning'
                    });
                    const res = await fetch(`/users/${id}`, { method: 'DELETE', headers: getHeaders() });
                    const data = await res.json();
                    if (data.code === 200) {
                        ElMessage.success('删除成功');
                        if (users.value.length === 1 && currentPage.value > 1) {
                            currentPage.value--;
                        }
                        await fetchUsers();
                    } else {
                        ElMessage.error(data.message || '删除失败');
                    }
                } catch (e) {
                    if (e !== 'cancel') ElMessage.error('请求错误');
                }
            };

            // ----- 登录/注册逻辑 -----
            const showLoginDialog = () => {
                loginForm.account = '';
                loginForm.password = '';
                loginDialogVisible.value = true;
            };
            const showRegisterDialog = () => {
                registerForm.username = '';
                registerForm.password = '';
                registerForm.email = '';
                registerForm.phone = '';
                registerDialogVisible.value = true;
            };

            const handleLogin = async () => {
                const valid = await loginFormRef.value.validate().catch(() => false);
                if (!valid) return;
                loginLoading.value = true;
                try {
                    const res = await fetch('/users/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(loginForm)
                    });
                    const data = await res.json();
                    if (data.code === 200) {
                        // 登录成功，假设后端返回用户信息在 data.data 中
                        const userInfo = data.data;
                        currentUser.value = {
                            id: userInfo.id,
                            username: userInfo.username,
                            role: userInfo.role || userInfo.identityDesc || '普通用户'
                        };
                        localStorage.setItem('currentUser', JSON.stringify(currentUser.value));
                        localStorage.setItem('token', userInfo.token); // 保存 Token
                        ElMessage.success('登录成功');
                        loginDialogVisible.value = false;
                        fetchUsers(); // 刷新列表
                    } else {
                        ElMessage.error(data.message || '登录失败');
                    }
                } catch (e) {
                    ElMessage.error('请求错误');
                } finally {
                    loginLoading.value = false;
                }
            };

            const handleRegister = async () => {
                const valid = await registerFormRef.value.validate().catch(() => false);
                if (!valid) return;
                registerLoading.value = true;
                try {
                    const res = await fetch('/users/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            username: registerForm.username,
                            password_hash: registerForm.password,  // 注意：你的后端字段是 password_hash
                            email: registerForm.email,
                            phone: registerForm.phone
                        })
                    });
                    const data = await res.json();
                    if (data.code === 200) {
                        ElMessage.success('注册成功，请登录');
                        registerDialogVisible.value = false;
                        showLoginDialog();
                    } else {
                        ElMessage.error(data.message || '注册失败');
                    }
                } catch (e) {
                    ElMessage.error('请求错误');
                } finally {
                    registerLoading.value = false;
                }
            };

            const handleLogout = () => {
                currentUser.value = null;
                localStorage.removeItem('currentUser');
                localStorage.removeItem('token');
                ElMessage.info('已退出登录');
                fetchUsers();
            };

            // 初始化加载用户列表
            fetchUsers();

            return {
                // 用户列表相关
                users, currentPage, pageSize, total, searchKeyword, loading,
                fetchUsers, handleSearch, handleReset, handleAdd, handleEdit, submitForm,
                handleDelete, handleSizeChange, handlePageChange,
                dialogVisible, dialogTitle, submitLoading, formRef, form, rules, resetForm,
                // 登录相关
                currentUser, loginDialogVisible, loginLoading, loginFormRef, loginForm, loginRules,
                showLoginDialog, handleLogin,
                // 注册相关
                registerDialogVisible, registerLoading, registerFormRef, registerForm, registerRules,
                showRegisterDialog, handleRegister,
                // 登出
                handleLogout
            };
        }
    }).use(ElementPlus).mount('#app');
</script>
</body>
</html>
